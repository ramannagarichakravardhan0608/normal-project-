<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{{ page_title or app_name }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script defer src="/static/js/app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">TF</span>
        <span>{{ app_name }}</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" data-nav-toggle>
        Menu
      </button>
      <nav id="primary-nav" class="nav">
        <a href="/">Home</a>
        {% if current_user or user %}
          <a href="/dashboard">Dashboard</a>
          <a href="/tasks/new">New Task</a>
          {% if (current_user or user).role == 'admin' %}
            <a href="/dashboard/admin">Admin</a>
          {% endif %}
          <form class="inline-form" action="/logout" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="nav-link-button">Logout</button>
          </form>
        {% else %}
          <a href="/login">Login</a>
          <a href="/register" class="button button-primary">Create account</a>
        {% endif %}
      </nav>
    </header>

    <main class="page">
      {% if notice %}
        <section class="alert alert-success" role="status">{{ notice }}</section>
      {% endif %}
      {% if error %}
        <section class="alert alert-error" role="alert">{{ error }}</section>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
