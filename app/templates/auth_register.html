{% extends "base.html" %}
{% block content %}
<section class="auth-layout">
  <article class="card auth-card">
    <span class="eyebrow">Start free</span>
    <h1>Create account</h1>
    <p>Register to manage your work in a secure dashboard.</p>
    {% if validation_errors %}
      <div class="form-errors">
        {% for error in validation_errors %}
          <p>{{ error.msg }}</p>
        {% endfor %}
      </div>
    {% endif %}
    <form class="form" method="post" action="/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label>
        <span>Full name</span>
        <input type="text" name="full_name" value="{{ form.full_name if form else '' }}" autocomplete="name" minlength="2" maxlength="120" required>
      </label>
      <label>
        <span>Email</span>
        <input type="email" name="email" value="{{ form.email if form else '' }}" autocomplete="email" required>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" autocomplete="new-password" minlength="8" required>
      </label>
      <button class="button button-primary" type="submit">Create account</button>
    </form>
    <p class="muted">Already have an account? <a href="/login">Sign in</a></p>
  </article>
</section>
{% endblock %}
