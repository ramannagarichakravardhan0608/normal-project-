{% extends "base.html" %}
{% block content %}
<section class="card empty-state">
  <span class="eyebrow">Error {{ status_code or 500 }}</span>
  <h1>{{ title or "Something went wrong" }}</h1>
  <p>{{ message or "An unexpected error occurred. Please try again." }}</p>
  <a class="button button-primary" href="/">Go home</a>
</section>
{% endblock %}
