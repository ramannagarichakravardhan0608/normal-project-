services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://taskflow:taskflow@db:5432/taskflow}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      COOKIE_SECURE: "false"
      AUTO_SEED: ${AUTO_SEED:-true}
      SECRET_KEY: ${SECRET_KEY:-replace-me-for-local-compose}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@12345}
      PORT: ${PORT:-8000}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
